<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meridian Wealth — Analyst Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <!-- Decorative animated background blobs -->
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="22" height="22" fill="none">
            <path d="M4 26 L4 6 L10 6 L16 16 L22 6 L28 6 L28 26 L23 26 L23 14 L18 22 L14 22 L9 14 L9 26 Z"
                  fill="white"/>
          </svg>
        </div>
        <div class="title-block">
          <h1>Meridian Wealth</h1>
          <p class="subtitle">Financial Analyst Agent</p>
        </div>
      </div>
      <div class="status">
        <div id="status-pill" class="status-pill status--unknown">
          <span id="status-dot" class="dot"></span>
          <span id="status-text">checking…</span>
        </div>
        <button id="new-chat" class="ghost-btn" title="Start a new conversation">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          New chat
        </button>
      </div>
    </header>

    <main id="messages" class="messages" aria-live="polite">
      <div class="welcome">
        <div class="welcome-badge">AI · Powered by GPT-5</div>
        <h2>How can I help <span class="gradient-text">today</span>?</h2>
        <p>Ask about a client portfolio, market data, policy guidelines, or live market news.</p>
        <div class="suggestions">
          <button class="suggestion">
            <span class="suggestion-icon">📊</span>
            Prepare a briefing for client CLT-001
          </button>
          <button class="suggestion">
            <span class="suggestion-icon">📋</span>
            What's our concentration limit policy?
          </button>
          <button class="suggestion">
            <span class="suggestion-icon">📈</span>
            How is the IT sector performing YTD?
          </button>
        </div>
      </div>
    </main>

    <footer class="composer">
      <div class="composer-row">
        <textarea
          id="input"
          rows="1"
          placeholder="Ask the analyst…  (Enter to send, Shift+Enter for newline)"
          autocomplete="off"
        ></textarea>
        <button id="send" class="send-btn" aria-label="Send">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M22 2L11 13"/>
            <path d="M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
      <div class="composer-meta">
        <label class="trace-toggle">
          <input type="checkbox" id="trace-toggle" checked />
          <span>Show tool-call trace</span>
        </label>
        <span id="conv-id" class="conv-id"></span>
      </div>
    </footer>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
